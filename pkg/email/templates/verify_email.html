<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <title>{{.Subject}}</title>
    <style>
      /* Email-safe CSS: keep it simple (no external fonts). */
      html,
      body {
        margin: 0;
        padding: 0;
        background: #141824;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #f6f7fb;
      }

      .bg {
        background: #141824;
      }

      .container {
        max-width: 560px;
      }

      .card {
        background: #1d2231;
        border: 1px solid #2b3347;
        border-radius: 18px;
        padding: 22px 20px;
      }

      .brand {
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 12px;
        color: #b9c0d0;
        margin-bottom: 12px;
      }

      .title {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.25;
        color: #ffffff;
      }

      .lead {
        margin: 0;
        font-size: 14px;
        line-height: 1.6;
        color: #b9c0d0;
      }

      .btn {
        display: inline-block;
        background: #6bd1e6;
        color: #141824;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        padding: 12px 16px;
        border-radius: 14px;
      }

      .btn:hover {
        filter: brightness(1.03);
      }

      .meta {
        margin: 0 0 10px;
        font-size: 13px;
        line-height: 1.6;
        color: #b9c0d0;
      }

      .code {
        margin: 0;
        padding: 12px 12px;
        border-radius: 14px;
        background: #232a3d;
        border: 1px solid #2b3347;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      .link {
        color: #f3b46c;
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .divider {
        height: 1px;
        background: #2b3347;
        margin: 18px 0 14px;
      }

      .footer {
        margin: 0;
        font-size: 12px;
        line-height: 1.6;
        color: #b9c0d0;
      }

      .fineprint {
        padding: 14px 6px 0;
        text-align: center;
        color: #6f7890;
        font-size: 11px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" class="bg">
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" class="container">
            <tr>
              <td class="card">
                <div class="brand">Arkive</div>
                <h1 class="title">Confirm your email</h1>
                <p class="lead">Tap the button to verify your Arkive account email address.</p>

                <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 20px 0 18px;">
                  <tr>
                    <td>
                      <a href="{{.VerifyURL}}" class="btn">Verify email</a>
                    </td>
                  </tr>
                </table>

                <p class="meta">This link expires in 24 hours.</p>
                <p class="meta">If the button doesn’t work, copy and paste this URL:</p>
                <p class="code"><a href="{{.VerifyURL}}" class="link">{{.VerifyURL}}</a></p>

                <div class="divider"></div>

                <p class="footer">If you didn’t sign up for Arkive, you can safely ignore this email.</p>
              </td>
            </tr>
            <tr>
              <td class="fineprint">
                <span>Sent by Arkive</span>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
