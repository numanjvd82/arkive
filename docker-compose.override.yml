services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${PG_USER:-devuser}:${PG_PASSWORD:-devpassword123!}@db:5432/${PG_DATABASE:-arkive_dev}?sslmode=disable
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
