{{define "layout"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/statics/reset.css" />
    <link rel="stylesheet" href="/statics/globals.css" />
    {{if .PageCSS}}
    <link rel="stylesheet" href="{{.PageCSS}}" />
    {{end}}
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <p class="logo">Arkive</p>
        <nav class="site-nav">
          <a href="/">Home</a>
          <a href="/login">Login</a>
          <a class="button" href="/signup">Sign Up</a>
        </nav>
      </div>
    </header>

    {{block "content" .}}{{end}}

    <footer class="site-footer">
      <div class="container">
        <p>Built for teams and solo makers.</p>
      </div>
    </footer>
  </body>
</html>
{{end}}
